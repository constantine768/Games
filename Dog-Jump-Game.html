<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jumping Dog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #1e293b;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            touch-action: none; /* Prevent pull-to-refresh on mobile */
        }
        #game-wrapper {
            position: relative;
            width: 100%;
            max-width: 450px; /* Limits size on large desktop screens */
            height: 100vh;
            max-height: 800px;
            aspect-ratio: 9/16;
            background: linear-gradient(to bottom, #87CEEB 0%, #e0f6ff 100%);
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        @media (min-width: 450px) {
            #game-wrapper {
                height: 90vh;
                border-radius: 16px;
            }
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* Custom UI Font */
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');
        .game-font {
            font-family: 'Fredoka One', cursive;
        }
    </style>
</head>
<body>

<div id="game-wrapper">
    <canvas id="gameCanvas" width="360" height="640"></canvas>
    
    <!-- UI Overlay -->
    <div id="ui-layer" class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
        
        <!-- Mute Button -->
        <button id="mute-btn" class="absolute top-4 right-4 text-2xl drop-shadow-md pointer-events-auto cursor-pointer hover:scale-110 transition-transform z-50 bg-white/50 rounded-full w-12 h-12 flex items-center justify-center border border-white/50 shadow-lg" aria-label="Toggle Sound">
            🔊
        </button>

        <!-- Start Screen -->
        <div id="start-screen" class="text-center pointer-events-auto transition-opacity duration-300 bg-white/30 p-6 rounded-2xl backdrop-blur-sm border border-white/50 shadow-lg">
            <h1 class="text-5xl game-font text-blue-800 drop-shadow-md mb-2">Jumping Dog</h1>
            <p class="text-gray-800 font-bold mb-6">Bounce on the tiles!</p>
            <p class="text-sm text-gray-700 mb-4 bg-white/50 p-2 rounded">
                <span class="block">💻 Use Arrows or A/D</span>
                <span class="block">📱 Touch & Drag to move</span>
            </p>
            <div class="flex gap-4 justify-center mb-6 text-sm font-bold text-gray-700">
                <div class="flex items-center"><div class="w-4 h-4 bg-green-500 rounded-sm mr-2"></div> Normal</div>
                <div class="flex items-center"><div class="w-4 h-4 bg-orange-400 rounded-sm mr-2 shadow-[0_-2px_0_yellow_inset]"></div> Power Jump!</div>
            </div>
            <button id="start-btn" class="game-font text-2xl bg-blue-500 hover:bg-blue-600 text-white py-3 px-8 rounded-full shadow-lg transform transition hover:scale-105 active:scale-95 border-b-4 border-blue-700">
                PLAY NOW
            </button>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over-screen" class="hidden text-center pointer-events-auto transition-opacity duration-300 bg-white/40 p-6 rounded-2xl backdrop-blur-md border border-white/50 shadow-xl">
            <h1 class="text-5xl game-font text-red-600 drop-shadow-md mb-2">Game Over!</h1>
            <p class="text-2xl game-font text-blue-800 mb-2">Score: <span id="final-score">0</span></p>
            <p class="text-lg game-font text-gray-700 mb-6">Best: <span id="best-score">0</span></p>
            <div class="flex flex-col gap-3">
                <button id="retry-level-btn" class="game-font text-xl bg-purple-500 hover:bg-purple-600 text-white py-2 px-6 rounded-full shadow-lg transform transition hover:scale-105 active:scale-95 border-b-4 border-purple-700">
                    RETRY LEVEL <span id="retry-level-num">1</span>
                </button>
                <button id="restart-btn" class="game-font text-xl bg-green-500 hover:bg-green-600 text-white py-2 px-6 rounded-full shadow-lg transform transition hover:scale-105 active:scale-95 border-b-4 border-green-700">
                    RESTART GAME
                </button>
            </div>
        </div>
    </div>
    
    <!-- Score HUD -->
    <div id="hud" class="absolute top-4 left-4 right-4 flex justify-between hidden pointer-events-none">
        <div class="game-font text-2xl text-blue-900 drop-shadow-[0_2px_2px_rgba(255,255,255,0.8)]">
            Score: <span id="hud-score">0</span>
        </div>
        <div class="game-font text-2xl text-purple-900 drop-shadow-[0_2px_2px_rgba(255,255,255,0.8)]">
            Level: <span id="hud-level">1</span>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // UI Elements
    const startScreen = document.getElementById('start-screen');
    const gameOverScreen = document.getElementById('game-over-screen');
    const hud = document.getElementById('hud');
    const hudScore = document.getElementById('hud-score');
    const hudLevel = document.getElementById('hud-level');
    const finalScore = document.getElementById('final-score');
    const bestScore = document.getElementById('best-score');
    const startBtn = document.getElementById('start-btn');
    const restartBtn = document.getElementById('restart-btn');
    const retryLevelBtn = document.getElementById('retry-level-btn');
    const retryLevelNum = document.getElementById('retry-level-num');
    const muteBtn = document.getElementById('mute-btn');

    // Audio System & Google Play Bridge Setup
    let audioCtx;
    let isMuted = false;

    muteBtn.addEventListener('click', () => {
        isMuted = !isMuted;
        muteBtn.innerText = isMuted ? '🔇' : '🔊';
        if (!isMuted && audioCtx && audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    });

    function initAudio() {
        if (!audioCtx) {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    // Synthesizer for game sounds (No external files needed!)
    function playSound(type) {
        if (isMuted || !audioCtx) return;
        
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        const now = audioCtx.currentTime;

        if (type === 'jump') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, now);
            osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
            gainNode.gain.setValueAtTime(0.3, now);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(now);
            osc.stop(now + 0.1);
        } else if (type === 'power') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(300, now);
            osc.frequency.exponentialRampToValueAtTime(1200, now + 0.2);
            gainNode.gain.setValueAtTime(0.3, now);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
            osc.start(now);
            osc.stop(now + 0.2);
        } else if (type === 'super') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(150, now);
            osc.frequency.exponentialRampToValueAtTime(1500, now + 0.4);
            gainNode.gain.setValueAtTime(0.2, now);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
            osc.start(now);
            osc.stop(now + 0.4);
        } else if (type === 'break') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(100, now);
            osc.frequency.exponentialRampToValueAtTime(50, now + 0.2);
            gainNode.gain.setValueAtTime(0.4, now);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
            osc.start(now);
            osc.stop(now + 0.2);
        } else if (type === 'gameover') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(300, now);
            osc.frequency.exponentialRampToValueAtTime(50, now + 0.5);
            gainNode.gain.setValueAtTime(0.4, now);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
            osc.start(now);
            osc.stop(now + 0.5);
        }
    }

    // Talk to Android WebView if Wrapped
    window.addEventListener('load', () => {
        if (window.AndroidPlayBridge) {
            window.AndroidPlayBridge.initGame();
        }
    });

    // Game Constants
    const CANVAS_WIDTH = 360;
    const CANVAS_HEIGHT = 640;
    const GRAVITY = 0.4;
    const JUMP_POWER = -10.5;
    const SUPER_JUMP_POWER = -16.5;
    const MEGA_JUMP_POWER = -24.5;
    const PLAYER_SPEED = 3;
    const PLATFORM_WIDTH = 65;
    const PLATFORM_HEIGHT = 15;
    const MAX_FALL_SPEED = 15;

    // Game State
    let state = 'START'; // START, PLAYING, GAMEOVER
    let score = 0;
    let highscore = localStorage.getItem('jumpingDogHighscore') || 0;
    let cameraY = 0;
    let animationId;
    
    let totalTilesGenerated = 0;
    let currentLevel = 1;
    let checkpoints = { 1: { score: 0 } };

    // Entities
    let player = {
        x: CANVAS_WIDTH / 2,
        y: CANVAS_HEIGHT / 2,
        width: 32,
        height: 32,
        vx: 0,
        vy: 0,
        facingRight: true
    };

    let platforms = [];
    let particles = [];
    let clouds = [];

    // Input Handling
    let keys = { ArrowLeft: false, ArrowRight: false, a: false, d: false };
    let touchTargetX = null;
    let isTouching = false;

    // Listeners
    window.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.ArrowLeft = true;
        if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.ArrowRight = true;
    });

    window.addEventListener('keyup', (e) => {
        if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.ArrowLeft = false;
        if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.ArrowRight = false;
    });

    function getCanvasX(clientX) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        return (clientX - rect.left) * scaleX;
    }

    // Touch & Mouse Support
    canvas.addEventListener('mousedown', (e) => { isTouching = true; touchTargetX = getCanvasX(e.clientX); });
    canvas.addEventListener('mousemove', (e) => { if (isTouching) touchTargetX = getCanvasX(e.clientX); });
    window.addEventListener('mouseup', () => { isTouching = false; touchTargetX = null; });

    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        isTouching = true;
        touchTargetX = getCanvasX(e.touches.clientX);
    }, {passive: false});
    
    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        if (isTouching) touchTargetX = getCanvasX(e.touches.clientX);
    }, {passive: false});

    window.addEventListener('touchend', () => { isTouching = false; touchTargetX = null; });

    // UI Buttons
    startBtn.addEventListener('click', () => startGame(1));
    restartBtn.addEventListener('click', () => startGame(1));
    retryLevelBtn.addEventListener('click', () => startGame(currentLevel));

    function initClouds() {
        clouds = [];
        for(let i=0; i<6; i++) {
            clouds.push({
                x: Math.random() * CANVAS_WIDTH,
                y: Math.random() * CANVAS_HEIGHT,
                speed: 0.2 + Math.random() * 0.3,
                size: 30 + Math.random() * 40
            });
        }
    }

    function createPlatform(y) {
        totalTilesGenerated++;
        
        // Check level up
        let newLevel = Math.floor(totalTilesGenerated / 50) + 1;
        if (newLevel > currentLevel) {
            currentLevel = newLevel;
            checkpoints[currentLevel] = { score: score };
            if (hudLevel) hudLevel.innerText = currentLevel;
        }

        // Determine type based on probabilities
        let typeRand = Math.random();
        let type = 'normal';
        
        if (typeRand < 0.03) {
            type = 'super'; // 3% Super jump (Rocket)
        } else if (typeRand < 0.12) {
            type = 'power'; // 9% Power jump (Spring)
        } else if (typeRand < 0.22) {
            type = 'fragile'; // 10% Fragile/Breakable
        } else if (typeRand < 0.42 && currentLevel > 1) {
            type = 'moving'; // 20% Moving (starts appearing on later levels)
        }

        let x = Math.random() * (CANVAS_WIDTH - PLATFORM_WIDTH);
        let vx = 0;
        if (type === 'moving') {
            vx = (Math.random() > 0.5 ? 1 : -1) * (1 + Math.random());
        }

        return {
            x: x,
            y: y,
            width: PLATFORM_WIDTH,
            height: PLATFORM_HEIGHT,
            type: type,
            vx: vx,
            broken: false
        };
    }

    function generateInitialPlatforms() {
        platforms = [];
        // Base platform so player doesn't fall immediately
        platforms.push({
            x: CANVAS_WIDTH/2 - PLATFORM_WIDTH/2,
            y: CANVAS_HEIGHT - 50,
            width: PLATFORM_WIDTH,
            height: PLATFORM_HEIGHT,
            type: 'normal',
            vx: 0,
            broken: false
        });
        
        let currentY = CANVAS_HEIGHT - 100;
        while (currentY > -100) {
            platforms.push(createPlatform(currentY));
            currentY -= (35 + Math.random() * 35); // Denser Spacing
        }
    }

    function startGame(level = 1) {
        initAudio(); // Initialize audio context upon user interaction
        state = 'PLAYING';
        startScreen.classList.add('hidden');
        gameOverScreen.classList.add('hidden');
        hud.classList.remove('hidden');
        
        currentLevel = level;
        score = checkpoints[level] ? checkpoints[level].score : 0;
        totalTilesGenerated = (level - 1) * 50;
        
        cameraY = 0;
        hudScore.innerText = Math.floor(score);
        hudLevel.innerText = currentLevel;
        
        player = {
            x: CANVAS_WIDTH / 2 - 16,
            y: CANVAS_HEIGHT - 150,
            width: 32,
            height: 32,
            vx: 0,
            vy: 0,
            facingRight: true
        };
        
        particles = [];
        generateInitialPlatforms();
        initClouds();
        
        if (animationId) cancelAnimationFrame(animationId);
        gameLoop();
    }

    function gameOver() {
        state = 'GAMEOVER';
        playSound('gameover');
        hud.classList.add('hidden');
        gameOverScreen.classList.remove('hidden');
        
        if (score > highscore) {
            highscore = Math.floor(score);
            localStorage.setItem('jumpingDogHighscore', highscore);
            
            // Push to Google Play Games Services if wrapped in Android App
            if (window.AndroidPlayBridge && window.AndroidPlayBridge.saveHighscore) {
                window.AndroidPlayBridge.saveHighscore(highscore, currentLevel);
            }
        }
        
        finalScore.innerText = Math.floor(score);
        bestScore.innerText = highscore;
        retryLevelNum.innerText = currentLevel;
    }

    function spawnParticles(x, y, color, count=5) {
        for(let i=0; i<count; i++) {
            particles.push({
                x: x,
                y: y,
                vx: (Math.random() - 0.5) * 6,
                vy: (Math.random() - 0.5) * 6,
                life: 1,
                color: color
            });
        }
    }

    function update() {
        if (state !== 'PLAYING') return;

        // Player X Movement
        if (keys.ArrowLeft) {
            player.vx = -PLAYER_SPEED;
            player.facingRight = false;
        } else if (keys.ArrowRight) {
            player.vx = PLAYER_SPEED;
            player.facingRight = true;
        } else if (isTouching && touchTargetX !== null) {
            // Smooth follow for touch/mouse
            const dx = touchTargetX - (player.x + player.width/2);
            if (Math.abs(dx) > 5) {
                player.vx = dx * 0.15; // Interpolation speed
                player.facingRight = dx > 0;
            } else {
                player.vx *= 0.5; // Friction when close
            }
        } else {
            player.vx *= 0.8; // Friction
        }

        // Apply velocity to position
        player.x += player.vx;
        
        // Screen wrap horizontally
        if (player.x > CANVAS_WIDTH) {
            player.x = -player.width;
        } else if (player.x + player.width < 0) {
            player.x = CANVAS_WIDTH;
        }

        // Player Y Movement (Physics)
        player.vy += GRAVITY;
        if (player.vy > MAX_FALL_SPEED) player.vy = MAX_FALL_SPEED;
        player.y += player.vy;

        // Platform specific logic (movement)
        platforms.forEach(p => {
            if (p.type === 'moving') {
                p.x += p.vx;
                if (p.x <= 0 || p.x + p.width >= CANVAS_WIDTH) {
                    p.vx *= -1;
                }
            }
        });

        // Collision Detection
        if (player.vy > 0) { // Only collide when falling down
            for (let i = 0; i < platforms.length; i++) {
                let p = platforms[i];
                if (p.broken) continue;

                // Check overlap
                if (player.x + player.width * 0.8 > p.x && 
                    player.x + player.width * 0.2 < p.x + p.width && 
                    player.y + player.height >= p.y && 
                    player.y + player.height <= p.y + p.height + player.vy) {
                    
                    // Bounce
                    player.y = p.y - player.height;
                    
                    if (p.type === 'super') {
                        player.vy = MEGA_JUMP_POWER;
                        spawnParticles(player.x + player.width/2, p.y, '#c084fc', 20);
                        playSound('super');
                    } else if (p.type === 'power') {
                        player.vy = SUPER_JUMP_POWER;
                        spawnParticles(player.x + player.width/2, p.y, '#f59e0b', 15);
                        playSound('power');
                    } else {
                        player.vy = JUMP_POWER;
                        spawnParticles(player.x + player.width/2, p.y, '#22c55e', 8);
                        playSound('jump');
                    }

                    if (p.type === 'fragile') {
                        p.broken = true;
                        playSound('break');
                        spawnParticles(p.x + p.width/2, p.y + p.height/2, '#78350f', 12);
                    }
                    break;
                }
            }
        }

        // Camera Scroll / Score logic
        let scrollThreshold = CANVAS_HEIGHT / 2;
        if (player.y < scrollThreshold) {
            let diff = scrollThreshold - player.y;
            player.y = scrollThreshold;
            score += diff * 0.1;
            hudScore.innerText = Math.floor(score);
            
            // Move platforms down
            platforms.forEach(p => p.y += diff);
            clouds.forEach(c => c.y += diff * 0.5); // Parallax clouds
        }

        // Manage Platforms (Remove off-screen, add new ones)
        for (let i = platforms.length - 1; i >= 0; i--) {
            if (platforms[i].y > CANVAS_HEIGHT || platforms[i].broken) {
                platforms.splice(i, 1);
            }
        }

        // Ensure we always have platforms generating upwards
        let highestPlatform = platforms.reduce((min, p) => p.y < min ? p.y : min, CANVAS_HEIGHT);
        while (highestPlatform > -50) {
            let newY = highestPlatform - (35 + Math.random() * (25 + Math.min(currentLevel*2, 20))); // Denser gap
            platforms.push(createPlatform(newY));
            highestPlatform = newY;
        }

        // Update Particles
        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.life -= 0.05;
            if (p.life <= 0) particles.splice(i, 1);
        }

        // Update Clouds
        clouds.forEach(c => {
            c.x -= c.speed;
            if (c.x + c.size * 2 < 0) {
                c.x = CANVAS_WIDTH + c.size;
                c.y = Math.random() * CANVAS_HEIGHT;
            }
        });

        // Check Game Over
        if (player.y > CANVAS_HEIGHT) {
            gameOver();
        }
    }

    function drawDog(x, y, w, h, facingRight, vy) {
        ctx.save();
        ctx.translate(x + w/2, y + h/2);
        
        // Slight stretch/squash based on velocity
        let stretch = 1 + (vy * 0.02);
        let squash = 1 - (vy * 0.02);
        // Clamp limits
        stretch = Math.max(0.8, Math.min(1.2, stretch));
        squash = Math.max(0.8, Math.min(1.2, squash));
        
        ctx.scale(facingRight ? squash : -squash, stretch);
        
        // Draw Dog emoji as graphics fallback
        ctx.font = "38px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("🐶", 0, 0);
        
        ctx.restore();
    }

    function draw() {
        // Clear background (handled by CSS gradient mostly, but clear canvas)
        ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

        // Draw Clouds
        ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
        clouds.forEach(c => {
            ctx.beginPath();
            ctx.arc(c.x, c.y, c.size, Math.PI * 0.5, Math.PI * 1.5);
            ctx.arc(c.x + c.size, c.y - c.size*0.3, c.size*0.8, Math.PI, Math.PI * 2);
            ctx.arc(c.x + c.size*2, c.y, c.size, Math.PI * 1.5, Math.PI * 0.5);
            ctx.closePath();
            ctx.fill();
        });

        // Draw Platforms
        platforms.forEach(p => {
            if (p.broken) return;

            if (p.type === 'normal') {
                // Green grassy tile
                ctx.fillStyle = '#4ade80'; // top grass
                ctx.beginPath();
                ctx.roundRect(p.x, p.y, p.width, p.height, 6);
                ctx.fill();
                
                // Dirt bottom
                ctx.fillStyle = '#854d0e';
                ctx.beginPath();
                ctx.roundRect(p.x, p.y + p.height - 5, p.width, 5, {bottomLeft: 6, bottomRight: 6});
                ctx.fill();
                
            } else if (p.type === 'power') {
                // Orange/Yellow Springy tile
                ctx.fillStyle = '#fb923c';
                ctx.beginPath();
                ctx.roundRect(p.x, p.y, p.width, p.height, 6);
                ctx.fill();

                // Spring indicator
                ctx.strokeStyle = '#eab308';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(p.x + p.width/2 - 10, p.y);
                ctx.lineTo(p.x + p.width/2 + 10, p.y - 4);
                ctx.lineTo(p.x + p.width/2 - 10, p.y - 8);
                ctx.lineTo(p.x + p.width/2 + 10, p.y - 12);
                ctx.stroke();
            } else if (p.type === 'moving') {
                // Blue moving tile
                ctx.fillStyle = '#60a5fa'; // top ice/water
                ctx.beginPath();
                ctx.roundRect(p.x, p.y, p.width, p.height, 6);
                ctx.fill();
                
                ctx.fillStyle = '#1e3a8a'; // bottom
                ctx.beginPath();
                ctx.roundRect(p.x, p.y + p.height - 5, p.width, 5, {bottomLeft: 6, bottomRight: 6});
                ctx.fill();
            } else if (p.type === 'fragile') {
                // Brown cracked tile
                ctx.fillStyle = '#d97706';
                ctx.beginPath();
                ctx.roundRect(p.x, p.y, p.width, p.height, 6);
                ctx.fill();
                
                // Cracks
                ctx.strokeStyle = '#78350f';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(p.x + 10, p.y);
                ctx.lineTo(p.x + 20, p.y + 8);
                ctx.lineTo(p.x + 15, p.y + p.height);
                ctx.moveTo(p.x + 40, p.y);
                ctx.lineTo(p.x + 35, p.y + 10);
                ctx.lineTo(p.x + 45, p.y + p.height);
                ctx.stroke();
            } else if (p.type === 'super') {
                // Purple Rocket tile
                ctx.fillStyle = '#a855f7';
                ctx.beginPath();
                ctx.roundRect(p.x, p.y, p.width, p.height, 6);
                ctx.fill();

                // Upward arrows
                ctx.fillStyle = '#fff';
                ctx.font = "14px Arial";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText("🚀", p.x + p.width/2, p.y + p.height/2 + 2);
            }
        });

        // Draw Particles
        particles.forEach(p => {
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
            ctx.fill();
        });
        ctx.globalAlpha = 1.0; // Reset alpha

        // Draw Player
        if (state === 'PLAYING') {
            drawDog(player.x, player.y, player.width, player.height, player.facingRight, player.vy);
        }
    }

    function gameLoop() {
        update();
        draw();
        
        if (state === 'PLAYING') {
            animationId = requestAnimationFrame(gameLoop);
        } else if (state === 'GAMEOVER') {
            // Draw one last frame to show falling dog
            draw();
        }
    }

    // Initial background draw
    initClouds();
    draw();

</script>
</body>
</html>
